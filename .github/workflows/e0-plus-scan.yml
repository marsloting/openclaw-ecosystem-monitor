name: OpenClaw Weekly Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

concurrency:
  group: openclaw-weekly-monitor
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run weekly OpenClaw monitor
        run: |
          node --version
          npm run check
          npm run openclaw:weekly
